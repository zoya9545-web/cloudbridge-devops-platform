apiVersion: apps/v1
kind: Deployment
metadata:
  name: cloudbridge-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: cloudbridge-app
  template:
    metadata:
      labels:
        app: cloudbridge-app
    spec:
      containers:
      - name: cloudbridge-container
        image: cloudbridge-app:latest
        ports:
        - containerPort: 3000
